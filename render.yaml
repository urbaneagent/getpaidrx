databases:
  - name: getpaidrx-db
    plan: starter
    databaseName: getpaidrx
    user: getpaidrx

services:
  - type: web
    name: getpaidrx
    runtime: node
    region: ohio
    plan: pro
    buildCommand: npm install && npm run build
    startCommand: node dist-server/index.js
    healthCheckPath: /api/health
    numInstances: 2
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: getpaidrx-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
